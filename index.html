<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Versace - Premium Start</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            background-color: #ffffff;
            /* Using the Serif font for the brand name feel */
            font-family: 'Cormorant Garamond', serif;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            color: #001a72; /* Deep Navy Blue */
            overflow: hidden;
        }

        /* --- TOP BRANDING --- */
        header {
            margin-top: 12vh;
            text-align: center;
        }

        .brand-name {
            font-size: 4rem;
            letter-spacing: 0.8rem;
            font-weight: 400;
            text-transform: uppercase;
        }

        /* --- MIDDLE BUTTON --- */
        main {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .start-btn {
            /* Using Sans-Serif for the UI element */
            font-family: 'Montserrat', sans-serif;
            border: 1.5px solid #001a72;
            padding: 18px 50px;
            text-decoration: none;
            color: #001a72;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .start-btn:hover {
            background-color: #001a72;
            color: #ffffff;
            letter-spacing: 6px; /* Elegant expansion on hover */
        }

        /* --- BOTTOM LOGO --- */
        footer {
            margin-bottom: 8vh;
        }

        .logo-container {
            width: 120px; /* Adjust size of logo here */
            height: auto;
            display: block;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            /* This filter makes a black logo appear deep blue */
            filter: brightness(0) saturate(100%) invert(11%) sepia(93%) saturate(2975%) hue-rotate(227deg) brightness(91%) contrast(101%);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="Versace Logo.png" alt="Brand Logo">
    </header>

    <main>
        <a href="page2.html" class="start-btn">Tap to Start</a>
    </main>

    <footer>
        <div class="logo-container">
            <img src="Logo.png" alt="Brand Logo">
        </div>
    </footer>

</body>
</html>
