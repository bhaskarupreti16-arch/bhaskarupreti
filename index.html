<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Versace - Premium Start</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            height: 100%;
            background-color: #ffffff;
            font-family: 'Cormorant Garamond', serif;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            color: #001a72;
            overflow: hidden;
        }
        header { margin-top: 12vh; text-align: center; }
        .logo-container { width: 300px; height: auto; display: block; }
        .logo-container img { width: 100%; height: auto; }
        main { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .start-btn {
            font-family: 'Montserrat', sans-serif;
            border: 1.5px solid #001a72;
            padding: 18px 50px;
            text-decoration: none;
            color: #001a72;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            transition: all 0.4s ease;
        }
        .start-btn:hover { background-color: #001a72; color: #ffffff; letter-spacing: 6px; }
        footer { margin-bottom: 8vh; }
        .medusa-logo { width: 120px; filter: brightness(0) saturate(100%) invert(11%) sepia(93%) saturate(2975%) hue-rotate(227deg) brightness(91%) contrast(101%); }
    </style>
</head>
<body>
    <header>
        <div class="logo-container"><img src="Versace Logo.png" alt="Versace"></div>
    </header>
    <main>
        <a href="page2.html" class="start-btn" onclick="localStorage.clear()">Tap to Start</a>
    </main>
    <footer>
        <img src="logo.png" alt="Medusa" class="medusa-logo">
    </footer>
</body>
</html>
