<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Versace Quiz - Question 3</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            background-color: #ffffff;
            font-family: 'Cormorant Garamond', serif;
            color: #001a72; /* Deep Navy Blue */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- HEADER --- */
        header {
            margin-top: 10vh;
            margin-bottom: 5vh;
            text-align: center;
        }

        .brand-name {
            font-size: 4.5rem;
            letter-spacing: 1rem;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* --- QUESTION & ANSWERS --- */
        main {
            width: 80%;
            max-width: 800px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .question-title {
            font-size: 2.2rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 3rem;
            line-height: 1.3;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .option-item {
            display: block;
            border: 3px solid #001a72;
            padding: 15px 25px;
            color: #001a72;
            font-size: 1.3rem;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
        }

        /* Subtle hover feedback */
        .option-item:hover {
            background-color: #f1f3ff;
        }

        /* --- SELECTED HIGHLIGHT (Same as Page 4 & 5) --- */
        .option-item.selected {
            background-color: #001a72 !important;
            color: #ffffff !important;
            pointer-events: none;
        }

        /* --- FOOTER NAVIGATION --- */
        footer {
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5vh;
            margin-top: 5vh;
            position: relative;
        }

        .nav-link {
            font-family: 'Montserrat', sans-serif;
            border: 3px solid #001a72;
            padding: 10px 45px;
            text-decoration: none;
            color: #001a72;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background-color: #001a72;
            color: #ffffff;
        }

        .medusa-box {
            width: 140px;
        }

        .medusa-box img {
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-name">VERSACE</div>
    </header>

    <main>
        <h2 class="question-title">III. How would you describe your personality in one word?</h2>
        
        <div class="options-list">
            <div class="option-item" onclick="selectOption(this)">A. Charismatic</div>
            <div class="option-item" onclick="selectOption(this)">B. Elegant</div>
            <div class="option-item" onclick="selectOption(this)">C. Cheerful</div>
            <div class="option-item" onclick="selectOption(this)">D. Practical</div>
        </div>
    </main>

    <footer>
        <a href="page5.html" class="nav-link">PREVIOUS</a>

        <div class="medusa-box">
            <img src="logo.png" alt="Medusa Logo">
        </div>

        <a href="page7.html" class="nav-link">NEXT</a>
    </footer>

    <script>
        function selectOption(clickedElement) {
            // Clear previous selections on this page
            const options = document.querySelectorAll('.option-item');
            options.forEach(opt => opt.classList.remove('selected'));
            
            // Lock in the new selection
            clickedElement.classList.add('selected');
        }
    </script>

</body>
</html>
