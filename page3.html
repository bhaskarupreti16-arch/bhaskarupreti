<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Versace - Style Quiz Intro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            background-color: #ffffff;
            font-family: 'Cormorant Garamond', serif;
            display: flex;
            flex-direction: column;
            color: #001a72;
            overflow: hidden;
        }

        /* --- HEADER --- */
        header {
            margin-top: 10vh;
            text-align: center;
            width: 100%;
        }

        .brand-name {
            font-size: 4.5rem;
            letter-spacing: 1rem;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* --- CONTENT AREA (Left Aligned) --- */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 15%; /* Mimics the offset in the image */
            max-width: 85%;
        }

        .question-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 2.5rem;
            line-height: 1.2;
        }

        .instruction-subtext {
            font-size: 1.6rem;
            line-height: 1.4;
            max-width: 700px;
            font-weight: 600;
        }

        /* --- FOOTER AREA --- */
        footer {
            height: 25vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .logo-box {
            width: 140px;
        }

        .logo-box img {
            width: 100%;
            height: auto;
        }

        /* --- NEXT BUTTON (Right Aligned) --- */
        .next-link {
            position: absolute;
            right: 15%;
            font-family: 'Montserrat', sans-serif;
            border: 3px solid #001a72;
            padding: 10px 50px;
            text-decoration: none;
            color: #001a72;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            transition: all 0.3s ease;
        }

        .next-link:hover {
            background-color: #001a72;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-name">VERSACE</div>
    </header>

    <main>
        <h2 class="question-title">What kind of Versace frame defines you?</h2>
        
        <p class="instruction-subtext">
            Choose the one that best represents you from the four answers.<br>
            No wrong answers, only truth, style and attitude.
        </p>
    </main>

    <footer>
        <div class="logo-box">
            <img src="logo.png" alt="Medusa" class="medusa-logo">
        </div>

        <a href="page4.html" class="next-link">NEXT</a>
    </footer>

</body>
</html>
