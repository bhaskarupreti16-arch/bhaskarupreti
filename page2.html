<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Versace - Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            font-family: 'Cormorant Garamond', serif;
            color: #001a72;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5vh 10%;
        }

        /* --- LOGO --- */
        .brand-header {
            font-size: 3.5rem;
            letter-spacing: 0.7rem;
            margin-bottom: 5vh;
            text-transform: uppercase;
        }

        /* --- FORM LAYOUT --- */
        form {
            width: 100%;
            max-width: 600px;
        }

        .input-group {
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #001a72;
        }

        label {
            display: block;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        input[type="text"], 
        input[type="email"], 
        input[type="tel"] {
            width: 100%;
            border: none;
            outline: none;
            padding: 5px 0;
            font-size: 1.1rem;
            background: transparent;
            color: #001a72;
        }

        /* --- PRIVACY SECTION --- */
        .privacy-notice {
            font-size: 0.85rem;
            line-height: 1.4;
            margin: 2rem 0;
            font-family: 'Montserrat', sans-serif;
        }

        .checkbox-container {
            display: flex;
            align-items: flex-start;
            margin-bottom: 1.5rem;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
        }

        /* Custom Radio/Circle style */
        .circle-check {
            height: 20px;
            width: 20px;
            border: 2px solid #001a72;
            border-radius: 50%;
            margin-right: 15px;
            flex-shrink: 0;
            display: inline-block;
            position: relative;
        }

        input[type="checkbox"] {
            display: none;
        }

        input[type="checkbox"]:checked + .circle-check::after {
            content: "";
            position: absolute;
            top: 3px;
            left: 3px;
            width: 10px;
            height: 100%;
            background-color: #001a72;
            border-radius: 50%;
            transform: scale(0.6);
        }

        /* --- CONFIRM BUTTON --- */
        .btn-container {
            display: flex;
            justify-content: center;
            margin-top: 3rem;
        }

        .confirm-btn {
            background: none;
            border: 3px solid #001a72;
            padding: 12px 60px;
            color: #001a72;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .confirm-btn:hover {
            background-color: #001a72;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="brand-header">VERSACE</div>

    <form action="page3.html">
        <div class="input-group">
            <label>Name</label>
            <input type="text" required>
        </div>
        <div class="input-group">
            <label>Surname</label>
            <input type="text" required>
        </div>
        <div class="input-group">
            <label>Title</label>
            <input type="text">
        </div>
        <div class="input-group">
            <label>Date of Birth</label>
            <input type="text" placeholder="DD/MM/YYYY">
        </div>
        <div class="input-group">
            <label>Country</label>
            <input type="text">
        </div>
        <div class="input-group">
            <label>Cel-Phone</label>
            <input type="tel">
        </div>
        <div class="input-group">
            <label>E-Mail</label>
            <input type="email" required>
        </div>

        <div class="privacy-notice">
            By checking this box, you confirm to have read and understood the Privacy Notice...
        </div>

        <label class="checkbox-container">
            <input type="checkbox">
            <span class="circle-check"></span>
            <span>Provide you personalized sale services in all Versace shops worldwide, send you promotional communications, newsletters...</span>
        </label>

        <label class="checkbox-container">
            <input type="checkbox">
            <span class="circle-check"></span>
            <span>Understand your purchasing preferences in order to send you additional communications and provide you services in line with your interests...</span>
        </label>

        <div class="btn-container">
            <button type="submit" class="confirm-btn">CONFIRM</button>
        </div>
    </form>

</body>
</html>
